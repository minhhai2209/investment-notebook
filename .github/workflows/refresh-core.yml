name: Refresh Core

on:
  push:
    branches:
      - codex/actions-bootstrap
  workflow_dispatch:
    inputs:
      refresh_map:
        description: Refresh VN30 + NVL scope before building artifacts
        required: true
        default: false
        type: boolean
      include_ohlc:
        description: Include next-session OHLC forecast in the core run
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: refresh-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-core:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Refresh Working Universe
        if: ${{ inputs.refresh_map }}
        run: ./broker.sh map

      - name: Build Core Artifacts
        run: |
          if [ "${{ inputs.include_ohlc }}" = "true" ]; then
            ./broker.sh prepare_core
          else
            ./broker.sh engine
            rm -rf out/analysis research
            ./broker.sh playbook
            ./broker.sh candidates core
          fi

      - name: Summarise Run
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          print("## Core Refresh")
          market_path = Path("out/market_summary.json")
          if market_path.exists():
              market = json.loads(market_path.read_text(encoding="utf-8"))
              print(f"- Snapshot: `{market.get('GeneratedAt', 'n/a')}`")
              print(f"- Universe tickers: `{market.get('UniverseTickerCount', 'n/a')}`")
              print(f"- BreadthAboveSMA20Pct: `{market.get('BreadthAboveSMA20Pct', 'n/a')}`")
              print(f"- BreadthPositive5dPct: `{market.get('BreadthPositive5dPct', 'n/a')}`")

          candidate_path = Path("out/analysis/candidates/candidate_watchlist_core.json")
          if candidate_path.exists():
              report = json.loads(candidate_path.read_text(encoding="utf-8"))
              rows = report.get("Rows", [])
              buy_now = [row["Ticker"] for row in rows if row.get("Decision") == "mua_ngay"]
              waiting = [row["Ticker"] for row in rows if row.get("Decision") == "chờ"]
              avoid = [row["Ticker"] for row in rows if row.get("Decision") == "không_mua"]
              print(f"- Buy now: `{', '.join(buy_now) if buy_now else 'none'}`")
              print(f"- Wait count: `{len(waiting)}`")
              print(f"- Avoid count: `{len(avoid)}`")
          PY

      - name: Upload Core Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-artifacts-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            data/industry_map.csv
            out/universe.csv
            out/market_summary.json
            out/sector_summary.csv
            out/analysis/candidates/candidate_watchlist_core.csv
            out/analysis/candidates/candidate_watchlist_core.json
            out/analysis/candidates/candidate_watchlist_core.md
            out/analysis/ticker_playbooks_live/**
            out/analysis/ml_ohlc_next_session.csv
