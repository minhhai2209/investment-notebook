universe:
  csv: data/industry_map.csv
  include_indices: false

technical_indicators:
  moving_averages: [20, 50, 200]
  ema_periods: [20, 50]
  rsi_periods: [14]
  atr_periods: [14]
  returns_periods: [5, 20, 60]
  bollinger:
    windows: [20]
    k: 2
    include_bands: false
  range_lookback_days: 252
  adv_periods: [20]
  macd:
    fast: 12
    slow: 26
    signal: 9

filters:
  shortlist:
    enabled: true
    rsi14_max: 25
    max_pct_to_lo_252: 2
    return20_max: -15
    return60_max: -25
    require_below_sma50_and_200: true
    min_adv_20: null
    drop_logic_all: true
    keep: []
    exclude: []

output:
  base_dir: out
  market_snapshot: technical.csv
  presets_dir: .
  portfolios_dir: .
  diagnostics_dir: .

execution:
  aggressiveness: med
  max_order_pct_adv: 0.1
  slice_adv_ratio: 0.25
  min_lot: 100
  max_qty_per_order: 500000

data:
  history_cache: out/data
  history_min_days: 400
  intraday_window_minutes: 720
  cafef_flow_enabled: false
  cafef_flow_cache: out/cafef_flows
  cafef_flow_max_age_hours: 4
  vietstock_overview_enabled: true
  vietstock_overview_cache: out/vietstock_overview
  vietstock_overview_max_age_hours: 0
